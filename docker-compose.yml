version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: atlasos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: atlasos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    container_name: atlasos-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  neo4j:
    image: neo4j:5.12-community
    container_name: atlasos-neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_import:/import
      - neo4j_plugins:/plugins
    restart: always

  redis:
    image: redis:7-alpine
    container_name: atlasos-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  neo4j_import:
  neo4j_plugins:
